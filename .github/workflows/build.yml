name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Miragon/pin-npm-dependencies@v1.0.0
        with:
          files: package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci
      - run: npm test
      - run: npm run build
